<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>party.MLBB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060810;
  --surface: #0c1020;
  --border: #1a2540;
  --accent: #00f5c4;
  --accent2: #7b61ff;
  --warn: #ff6b35;
  --gold: #ffcc44;
  --dim: #2a3a5a;
  --text: #8ba8cc;
  --mono: 'Share Tech Mono', monospace;
  --display: 'Orbitron', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  height: 100%;
  overflow: hidden;
  touch-action: none;
  user-select: none;
}

/* ── LAYOUT ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

/* ── TOP BAR ── */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px 6px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#logo {
  font-family: var(--display);
  font-size: 1rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.12em;
}
#logo span { color: var(--accent2); }
#stats {
  display: flex;
  gap: 14px;
  font-size: 0.68rem;
  letter-spacing: 0.06em;
  color: var(--dim);
}
#stats .val { color: var(--accent); font-size: 0.78rem; }
#stats .combo-display { color: var(--gold); font-size: 0.78rem; transition: transform 0.1s; }
#stats .combo-display.pop { transform: scale(1.3); }

/* ── CAMERA ZONE ── */
#camZone {
  position: relative;
  width: 100%;
  flex-shrink: 0;
  background: #000;
  overflow: hidden;
}
#camZone::before {
  content: '';
  display: block;
  padding-top: 52%;
}
#camFeed {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.38;
  pointer-events: none;
  transform: scaleX(-1); /* default mirror untuk kamera depan */
}
#overlayCanvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}
/* scanline effect */
#camZone::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
}
/* corner markers */
.corner {
  position: absolute;
  width: 14px; height: 14px;
  border-color: var(--accent);
  border-style: solid;
  opacity: 0.6;
  z-index: 2;
}
.tl { top:6px; left:6px; border-width:1.5px 0 0 1.5px; }
.tr { top:6px; right:6px; border-width:1.5px 1.5px 0 0; }
.bl { bottom:6px; left:6px; border-width:0 0 1.5px 1.5px; }
.br { bottom:6px; right:6px; border-width:0 1.5px 1.5px 0; }

/* gesture badge */
#gestureBadge {
  position: absolute;
  bottom: 7px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(6,8,16,0.82);
  border: 1px solid var(--border);
  color: var(--dim);
  font-family: var(--mono);
  font-size: 0.65rem;
  padding: 3px 12px;
  border-radius: 2px;
  white-space: nowrap;
  letter-spacing: 0.08em;
  z-index: 3;
  transition: color 0.2s, border-color 0.2s;
}
#gestureBadge.open { color: var(--accent); border-color: var(--accent); }
#gestureBadge.two { color: #ffcc44; border-color: #ffcc44; }
#gestureBadge.detected { color: var(--accent2); border-color: var(--accent2); }

/* ── HINT ROW ── */
#hintRow {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 5px 10px;
  font-size: 0.62rem;
  color: var(--dim);
  letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#hintRow .h { color: var(--text); }

/* ── GAME CANVAS ── */
#gameWrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 0;
}
#gameCanvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* ── START OVERLAY ── */
#startOverlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(6,8,16,0.85);
  z-index: 10;
}
#startOverlay h2 {
  font-family: var(--display);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.15em;
  margin-bottom: 6px;
}
#startOverlay p {
  font-size: 0.7rem;
  color: var(--dim);
  margin-bottom: 8px;
  letter-spacing: 0.06em;
}
#startBtn {
  font-family: var(--display);
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--bg);
  background: var(--accent);
  border: none;
  border-radius: 2px;
  padding: 12px 36px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.15s;
  margin-top: 16px;
}
#startBtn:active { opacity: 0.7; }
#startOverlay .sub {
  font-size: 0.62rem;
  color: var(--dim);
  margin-top: 10px;
  letter-spacing: 0.05em;
}
#startOverlay .tip-list {
  font-size: 0.6rem;
  color: var(--dim);
  margin-top: 6px;
  text-align: center;
  line-height: 1.7;
  letter-spacing: 0.04em;
}
#startOverlay .tip-list span { color: var(--accent); }

/* ── CAM STATUS ── */
#camStatus {
  position: absolute;
  top: 4px; left: 50%;
  transform: translateX(-50%);
  font-size: 0.6rem;
  color: var(--warn);
  letter-spacing: 0.05em;
  z-index: 3;
  white-space: nowrap;
}

/* camera toggle button */
#camToggleBtn {
  position: absolute;
  top: 6px;
  right: 6px;
  z-index: 4;
  background: rgba(6,8,16,0.75);
  border: 1px solid var(--border);
  color: var(--dim);
  font-size: 1rem;
  width: 28px;
  height: 28px;
  border-radius: 2px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
  line-height: 1;
  padding: 0;
}
#camToggleBtn:active {
  color: var(--accent);
  border-color: var(--accent);
}
#camToggleBtn.switching {
  opacity: 0.4;
  pointer-events: none;
}

#flashOverlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 5;
  opacity: 0;
  transition: opacity 0.08s;
}
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <div id="logo">HAND<span>.</span>RUN</div>
    <div id="stats">
      SCR <span class="val" id="scoreVal">000000</span>
      BEST <span class="val" id="bestVal">000000</span>
      <span id="comboWrap" style="display:none">×<span class="combo-display" id="comboVal">1</span></span>
    </div>
  </div>

  <!-- CAMERA ZONE -->
  <div id="camZone">
    <video id="camFeed" autoplay playsinline muted></video>
    <canvas id="overlayCanvas"></canvas>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div id="gestureBadge">INITIALIZING SENSOR...</div>
    <div id="camStatus"></div>
    <button id="camToggleBtn" title="Ganti Kamera">⇄</button>
  </div>

  <!-- HINT ROW -->
  <div id="hintRow">
    <span><span class="h">✋ FULL OPEN</span> → KANAN</span>
    <span>|</span>
    <span>KIRI ← <span class="h">2 JARI ✌</span></span>
  </div>

  <!-- GAME CANVAS -->
  <div id="gameWrap">
    <canvas id="gameCanvas"></canvas>
    <div id="flashOverlay"></div>
    <div id="startOverlay">
      <h2>party.MLBB</h2>
      <p>GESTURE-CONTROLLED LANE RUNNER</p>
      <div class="tip-list">
        <span>✋ PALM TERBUKA</span> → geser kanan<br>
        <span>✌ DUA JARI</span> → geser kiri<br>
        hindari rintangan · kumpulkan combo
      </div>
      <button id="startBtn">MULAI</button>
      <div class="sub">arahkan kamera ke tangan anda</div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
// ── REFS ──
const gameCanvas = document.getElementById('gameCanvas');
const gc = gameCanvas.getContext('2d');
const overlayCanvas = document.getElementById('overlayCanvas');
const oc = overlayCanvas.getContext('2d');
const video = document.getElementById('camFeed');
const gestureBadge = document.getElementById('gestureBadge');
const startOverlay = document.getElementById('startOverlay');
const startBtn = document.getElementById('startBtn');
const scoreVal = document.getElementById('scoreVal');
const bestVal = document.getElementById('bestVal');
const comboVal = document.getElementById('comboVal');
const comboWrap = document.getElementById('comboWrap');
const camStatus = document.getElementById('camStatus');
const flashOverlay = document.getElementById('flashOverlay');

// ── GAME STATE ──
let W, H, LANE_W;
const NUM_LANES = 5;
const CHAR_W = 22, CHAR_H = 32;
let gameRunning = false;
let score = 0, best = 0;
let currentLane = 2;
let obstacles = [];
let particles = [];
let floatingTexts = [];
let frameCount = 0;
let speed = 3.0;        // mulai lebih pelan, lebih enak di awal
let gestureCooldown = 0;
const GESTURE_COOLDOWN_FRAMES = 18;
let pendingMove = null;
let lastGesture = null;
let animId = null;

// combo system
let combo = 1;
let comboTimer = 0;
const COMBO_MAX_TIMER = 240; // 4 detik — lebih pemaaf

// screen shake
let shakeX = 0, shakeY = 0;

// invincibility frames after collecting a gap
let iFrames = 0;

function fmt(n) { return String(Math.floor(n)).padStart(6,'0'); }

function resizeCanvas() {
  const wrap = document.getElementById('gameWrap');
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  gameCanvas.width = W;
  gameCanvas.height = H;
  LANE_W = W / NUM_LANES;

  const cam = document.getElementById('camZone');
  // Match canvas buffer exactly to CSS display size (no DPR tricks — keep it simple & accurate)
  const dispW = cam.clientWidth;
  const dispH = cam.clientHeight;
  overlayCanvas.width = dispW;
  overlayCanvas.height = dispH;
}

window.addEventListener('resize', () => { resizeCanvas(); });
window.addEventListener('orientationchange', () => { setTimeout(resizeCanvas, 200); });
resizeCanvas();

// ── LANE HELPERS ──
function laneX(lane) { return LANE_W * lane + LANE_W / 2; }

// ── FLOATING TEXT ──
function spawnFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 1, vy: -1.5 });
}

// ── OBSTACLE PATTERNS ──
// Pattern types: random, wall (4 lanes, 1 gap), zigzag, double
let patternQueue = [];
let lastPatternY = -999;

function generatePattern() {
  const diff = Math.min(1, score / 2500);
  const r = Math.random();
  let lanes = [];

  if (r < 0.32) {
    // single — selalu aman
    lanes = [Math.floor(Math.random() * NUM_LANES)];
  } else if (r < 0.32 + 0.18 * diff) {
    // wall: di awal, gap selalu di lane player supaya tidak unfair
    let gap;
    if (diff < 0.4) {
      // gap di lane player atau 1 lane sebelah
      const offset = Math.random() < 0.5 ? 0 : (Math.random() < 0.5 ? -1 : 1);
      gap = Math.max(0, Math.min(4, currentLane + offset));
    } else {
      gap = Math.floor(Math.random() * NUM_LANES);
    }
    for (let i = 0; i < NUM_LANES; i++) if (i !== gap) lanes.push(i);
  } else if (r < 0.68) {
    // double — 2 lane berdekatan, tidak di lane player
    let start;
    let tries = 0;
    do {
      start = Math.floor(Math.random() * (NUM_LANES - 1));
      tries++;
    } while (tries < 5 && (start === currentLane || start + 1 === currentLane));
    lanes = [start, start + 1];
  } else if (r < 0.82 + 0.10 * diff) {
    // alternating
    lanes = Math.random() < 0.5 ? [0, 2, 4] : [1, 3];
  } else {
    lanes = [Math.floor(Math.random() * NUM_LANES)];
  }

  return lanes.map(lane => {
    const isBig = Math.random() < (0.10 + 0.18 * diff);
    return {
      lane, y: -40,
      w: LANE_W * (isBig ? 0.80 : 0.62),
      h: isBig ? 17 : 11,
      type: isBig ? 'wall' : 'spike'
    };
  });
}

function spawnObstaclePattern() {
  const pattern = generatePattern();
  pattern.forEach(ob => obstacles.push(ob));
}

// ── PARTICLE ──
const MAX_PARTICLES = 60; // batasi jumlah partikel maksimum
function spawnParticles(x, y, color, count, spread = 3) {
  const room = MAX_PARTICLES - particles.length;
  const actual = Math.min(count, room);
  for (let i = 0; i < actual; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 1 + Math.random() * spread;
    particles.push({ x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd - 1, life: 1, color, size: 1 + Math.random() * 2 });
  }
}

// ── SCREEN SHAKE ──
function triggerShake(intensity) {
  shakeX = (Math.random() - 0.5) * intensity;
  shakeY = (Math.random() - 0.5) * intensity;
  setTimeout(() => { shakeX = 0; shakeY = 0; }, 100);
}

// ── FLASH ──
function triggerFlash(color) {
  flashOverlay.style.background = color;
  flashOverlay.style.opacity = '0.35';
  setTimeout(() => { flashOverlay.style.opacity = '0'; }, 80);
}

// ── DRAW BACKGROUND ──
function drawBackground() {
  gc.save();
  gc.translate(shakeX, shakeY);

  gc.fillStyle = '#060810';
  gc.fillRect(0, 0, W, H);

  // moving grid lines
  gc.strokeStyle = '#0e1628';
  gc.lineWidth = 1;
  const gridSpacing = 40;
  for (let y = frameCount % gridSpacing; y < H; y += gridSpacing) {
    gc.beginPath(); gc.moveTo(0, y); gc.lineTo(W, y); gc.stroke();
  }

  // speed lines when fast — pakai posisi pre-computed, bukan Math.random() tiap frame
  if (speed > 7) {
    const alpha = Math.min(0.3, (speed - 7) * 0.06);
    gc.strokeStyle = `rgba(0,245,196,${alpha})`;
    gc.lineWidth = 0.5;
    // gunakan frameCount sebagai seed pseudo-random agar konsisten
    for (let i = 0; i < 6; i++) {
      const sx = ((frameCount * 37 + i * 113) % W);
      const len = 20 + ((frameCount * 17 + i * 61) % 40);
      gc.beginPath(); gc.moveTo(sx, 0); gc.lineTo(sx, len); gc.stroke();
    }
  }

  // lane dividers
  for (let i = 1; i < NUM_LANES; i++) {
    gc.setLineDash([8, 14]);
    gc.strokeStyle = '#1a2540';
    gc.lineWidth = 1;
    gc.beginPath();
    gc.moveTo(i * LANE_W, 0);
    gc.lineTo(i * LANE_W, H);
    gc.stroke();
  }
  gc.setLineDash([]);

  // current lane highlight
  gc.fillStyle = 'rgba(0,245,196,0.025)';
  gc.fillRect(currentLane * LANE_W, 0, LANE_W, H);

  // lane index labels
  for (let i = 0; i < NUM_LANES; i++) {
    gc.fillStyle = '#12192e';
    gc.font = `10px 'Share Tech Mono', monospace`;
    gc.textAlign = 'center';
    gc.fillText(i + 1, laneX(i), 13);
  }

  gc.restore();
}

function drawObstacles() {
  gc.save();
  gc.translate(shakeX, shakeY);

  obstacles.forEach(ob => {
    const x = laneX(ob.lane);
    const isBig = ob.type === 'wall';
    const color = isBig ? '#ff3a3a' : '#ff6b35';

    gc.save();
    // shadowBlur dihapus dari sini — terlalu berat per obstacle
    gc.strokeStyle = color;
    gc.lineWidth = 1.5;
    gc.fillStyle = color + '22';
    gc.beginPath();
    gc.rect(x - ob.w/2, ob.y, ob.w, ob.h);
    gc.fill();
    gc.stroke();

    // inner chevron detail
    gc.strokeStyle = color + 'aa';
    gc.lineWidth = 0.7;
    if (isBig) {
      // wall has double line
      gc.beginPath();
      gc.moveTo(x - ob.w/2 + 4, ob.y + ob.h * 0.35);
      gc.lineTo(x + ob.w/2 - 4, ob.y + ob.h * 0.35);
      gc.stroke();
      gc.beginPath();
      gc.moveTo(x - ob.w/2 + 4, ob.y + ob.h * 0.65);
      gc.lineTo(x + ob.w/2 - 4, ob.y + ob.h * 0.65);
      gc.stroke();
    } else {
      // spike has a center mark
      gc.beginPath();
      gc.moveTo(x - ob.w/4, ob.y + ob.h/2);
      gc.lineTo(x + ob.w/4, ob.y + ob.h/2);
      gc.stroke();
    }
    gc.restore();
  });

  gc.restore();
}

function drawCharacter() {
  const x = laneX(currentLane) + shakeX;
  const y = H - 70 + shakeY;

  gc.save();
  // shadowBlur dikurangi — cukup 1 pass saja
  const glowIntensity = combo >= 4 ? 18 : 12;
  gc.shadowBlur = glowIntensity;
  gc.shadowColor = combo >= 4 ? '#ffcc44' : '#00f5c4';

  const bodyColor = combo >= 4 ? '#ffcc44' : '#00f5c4';
  const fillColor = combo >= 4 ? '#ffcc4422' : '#00f5c422';

  // ship body
  gc.strokeStyle = bodyColor;
  gc.lineWidth = 1.5;
  gc.fillStyle = fillColor;
  gc.beginPath();
  gc.moveTo(x, y - CHAR_H/2);
  gc.lineTo(x + CHAR_W/2, y + CHAR_H/2);
  gc.lineTo(x, y + CHAR_H/3);
  gc.lineTo(x - CHAR_W/2, y + CHAR_H/2);
  gc.closePath();
  gc.fill();
  gc.stroke();

  // center line
  gc.shadowBlur = 0; // matikan shadow untuk detail kecil
  gc.strokeStyle = bodyColor + 'cc';
  gc.lineWidth = 1;
  gc.beginPath();
  gc.moveTo(x, y - CHAR_H/2 + 4);
  gc.lineTo(x, y + CHAR_H/3 - 2);
  gc.stroke();

  // thruster trail
  const trailLen = 14 + speed * 2 + Math.sin(frameCount * 0.35) * 6;
  const trailColor = combo >= 4 ? '#ff6b35' : '#7b61ff';
  gc.strokeStyle = trailColor;
  gc.lineWidth = 2;
  gc.shadowColor = trailColor;
  gc.shadowBlur = 8; // dikurangi dari 12
  gc.beginPath();
  gc.moveTo(x, y + CHAR_H/2);
  gc.lineTo(x, y + CHAR_H/2 + trailLen);
  gc.stroke();

  // iFrames: blinking shield
  if (iFrames > 0 && Math.floor(iFrames / 4) % 2 === 0) {
    gc.strokeStyle = '#00f5c488';
    gc.lineWidth = 1;
    gc.shadowBlur = 12; // dikurangi dari 20
    gc.shadowColor = '#00f5c4';
    gc.beginPath();
    gc.arc(x, y, CHAR_W, 0, Math.PI * 2);
    gc.stroke();
  }

  gc.restore();
}

function drawParticles() {
  particles.forEach(p => {
    gc.save();
    gc.globalAlpha = p.life;
    gc.fillStyle = p.color;
    // shadowBlur dihapus dari partikel — sangat berat saat banyak partikel
    gc.beginPath();
    gc.arc(p.x + shakeX, p.y + shakeY, p.size, 0, Math.PI*2);
    gc.fill();
    gc.restore();
  });
}

function drawFloatingTexts() {
  floatingTexts.forEach(ft => {
    gc.save();
    gc.globalAlpha = ft.life;
    gc.font = `bold 13px 'Orbitron', sans-serif`;
    gc.fillStyle = ft.color;
    gc.textAlign = 'center';
    // shadowBlur dihapus
    gc.fillText(ft.text, ft.x + shakeX, ft.y + shakeY);
    gc.restore();
  });
}

function drawHUD() {
  // bottom status bar
  gc.fillStyle = '#06081088';
  gc.fillRect(0, H - 24, W, 24);
  gc.strokeStyle = '#1a2540';
  gc.lineWidth = 1;
  gc.beginPath(); gc.moveTo(0, H-24); gc.lineTo(W, H-24); gc.stroke();

  gc.font = `11px 'Share Tech Mono', monospace`;
  gc.textAlign = 'left';
  gc.fillStyle = '#2a3a5a';
  gc.fillText(`LN:${currentLane+1}`, 10, H - 8);

  gc.textAlign = 'center';
  gc.fillStyle = '#00f5c455';
  gc.fillText(`SPD ${speed.toFixed(1)}`, W/2, H-8);

  gc.textAlign = 'right';
  gc.fillStyle = combo >= 4 ? '#ffcc4488' : '#2a3a5a';
  gc.fillText(`×${combo} COMBO`, W-10, H-8);
}

function drawGameOver() {
  gc.save();
  gc.fillStyle = 'rgba(6,8,16,0.88)';
  gc.fillRect(0, 0, W, H);

  gc.font = `bold 1.4rem 'Orbitron', sans-serif`;
  gc.fillStyle = '#ff3a3a';
  gc.textAlign = 'center';
  gc.shadowBlur = 20; gc.shadowColor = '#ff3a3a';
  gc.fillText('SYSTEM CRASH', W/2, H/2 - 28);
  gc.shadowBlur = 0;

  gc.font = `0.72rem 'Share Tech Mono', monospace`;
  gc.fillStyle = '#2a3a5a';
  gc.fillText(`SCORE: ${fmt(score)}`, W/2, H/2 + 2);
  gc.fillStyle = '#00f5c466';
  gc.fillText(score >= best ? 'NEW BEST!' : `BEST: ${fmt(best)}`, W/2, H/2 + 20);
  gc.restore();

  startOverlay.style.display = 'flex';
  startOverlay.querySelector('h2').textContent = 'GAME OVER';
  startOverlay.querySelector('h2').style.color = '#ff3a3a';
  startOverlay.querySelector('p').textContent = `SCORE: ${fmt(score)}`;
  startBtn.textContent = 'RESTART';
}

// ── COLLISION ──
function checkCollision() {
  if (iFrames > 0) return false;
  const cy = H - 70;
  for (let ob of obstacles) {
    if (ob.lane === currentLane) {
      const obCy = ob.y + ob.h / 2;
      if (Math.abs(cy - obCy) < (CHAR_H/2 + ob.h/2) - 5) return true;
    }
  }
  return false;
}

// ── DODGE DETECTION (passed obstacle without hitting) ──
function checkDodge() {
  const cy = H - 70;
  obstacles.forEach(ob => {
    if (!ob.scored && ob.y > cy + CHAR_H/2 + 5) {
      ob.scored = true;
      // reward dodge
      combo = Math.min(combo + 1, 8);
      comboTimer = COMBO_MAX_TIMER;
      if (combo >= 2) {
        spawnFloatingText(laneX(currentLane), H - 100, `×${combo}!`, combo >= 5 ? '#ffcc44' : '#00f5c4');
        spawnParticles(laneX(currentLane), H - 70, combo >= 5 ? '#ffcc44' : '#00f5c4', 6, 2);
      }
      if (combo === 4) triggerFlash('#00f5c4');
    }
  });
}

// ── GAME LOOP ──
let lastFrameTime = 0;
const TARGET_FPS = 60;
const FRAME_MS = 1000 / TARGET_FPS;

function gameLoop(timestamp) {
  if (!gameRunning) return;

  // cap ke 60fps agar tidak boros di layar 90/120hz
  if (timestamp - lastFrameTime < FRAME_MS - 1) {
    animId = requestAnimationFrame(gameLoop);
    return;
  }
  lastFrameTime = timestamp;
  frameCount++;
  score += combo * 0.4;

  // Grace period 3 detik pertama: obstacle belum spawn, speed masih rendah
  const graceOver = frameCount > 180;

  // Speed curve: pelan di awal, naik gradual
  // score 0=3.0, 300=4.5, 800=6.0, 1500=8.0, 3000=11.0, max 12
  speed = graceOver
    ? Math.min(12, 3.0 + Math.pow(score / 400, 0.7) * 2.0)
    : 2.5;

  // combo timer decay
  if (comboTimer > 0) {
    comboTimer--;
  } else if (combo > 1) {
    combo = 1;
    comboWrap.style.display = 'none';
  }

  // update combo display
  if (combo >= 2) {
    comboWrap.style.display = 'inline';
    comboVal.textContent = combo;
  }

  if (gestureCooldown > 0) gestureCooldown--;

  if (gestureCooldown === 0 && pendingMove !== null) {
    const prev = currentLane;
    currentLane = Math.max(0, Math.min(4, currentLane + pendingMove));
    if (currentLane !== prev) {
      spawnParticles(laneX(currentLane), H-70, '#00f5c4', 8);
    }
    pendingMove = null;
    gestureCooldown = GESTURE_COOLDOWN_FRAMES;
  }

  // Spawn: tidak spawn selama grace period
  // Rate: mulai longgar (90 frame), makin rapat di score tinggi, min 35
  if (graceOver) {
    const spawnRate = Math.max(35, Math.round(90 - Math.pow(score / 60, 0.6) * 1.8));
    if (frameCount % spawnRate === 0) spawnObstaclePattern();
  }

  obstacles.forEach(ob => ob.y += speed);
  obstacles = obstacles.filter(ob => ob.y < H + 50);

  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life -= 0.045; });
  particles = particles.filter(p => p.life > 0);

  floatingTexts.forEach(ft => { ft.y += ft.vy; ft.life -= 0.03; });
  floatingTexts = floatingTexts.filter(ft => ft.life > 0);

  if (iFrames > 0) iFrames--;

  checkDodge();

  if (checkCollision()) {
    gameRunning = false;
    if (score > best) best = score;
    bestVal.textContent = fmt(best);
    triggerShake(12);
    triggerFlash('#ff3a3a');
    spawnParticles(laneX(currentLane), H-70, '#ff3a3a', 28, 4);
    setTimeout(() => {
      drawBackground(); drawObstacles(); drawParticles(); drawCharacter();
      drawGameOver();
    }, 200);
    return;
  }

  drawBackground();
  drawObstacles();
  drawParticles();
  drawFloatingTexts();
  drawCharacter();
  drawHUD();

  scoreVal.textContent = fmt(score);

  animId = requestAnimationFrame(gameLoop);
}

function resetGame() {
  score = 0; currentLane = 2; obstacles = []; particles = []; floatingTexts = [];
  frameCount = 0; speed = 3.0; gestureCooldown = 0;
  pendingMove = null; lastGesture = null;
  combo = 1; comboTimer = 0; iFrames = 0; shakeX = 0; shakeY = 0;
  comboWrap.style.display = 'none';
}

startBtn.addEventListener('click', () => {
  if (animId) cancelAnimationFrame(animId);
  resetGame();
  startOverlay.style.display = 'none';
  startOverlay.querySelector('h2').textContent = 'party.MLBB';
  startOverlay.querySelector('h2').style.color = '';
  startOverlay.querySelector('p').textContent = 'GESTURE-CONTROLLED LANE RUNNER';
  startBtn.textContent = 'MULAI';
  gameRunning = true;
  lastFrameTime = 0;
  requestAnimationFrame(gameLoop);
});

// Idle draw — throttled ke ~20fps, tidak perlu 60fps saat menu
let lastIdleTime = 0;
(function idleDraw(ts) {
  if (gameRunning) return;
  if (ts - lastIdleTime > 50) { // ~20fps
    drawBackground();
    lastIdleTime = ts;
  }
  requestAnimationFrame(idleDraw);
})();

// ── HAND SKELETON ──
// FIX: Mirror canvas transform to match video scaleX(-1)
const FINGER_SEGS = [
  [1,2,3,4],    // thumb
  [5,6,7,8],    // index
  [9,10,11,12], // middle
  [13,14,15,16],// ring
  [17,18,19,20],// pinky
];

function drawHandSkeleton(landmarks) {
  const CW = overlayCanvas.width;
  const CH = overlayCanvas.height;

  oc.clearRect(0, 0, CW, CH);

  // Video sudah tampil via CSS <video> tag — tidak perlu drawImage lagi.
  // Canvas overlay hanya untuk skeleton.

  // Koordinat mapping: landmark normalized → canvas pixels
  // Karena video sudah di-mirror via CSS, skeleton juga perlu di-flip untuk kamera depan
  const shouldMirror = currentFacingMode === 'user';

  function px(lm) {
    const x = shouldMirror ? (1 - lm.x) * CW : lm.x * CW;
    return { x, y: lm.y * CH };
  }

  // ── Gambar semua tulang dalam 1 path batch per warna ──
  oc.strokeStyle = '#00c896';
  oc.lineWidth = 2;
  oc.beginPath();

  // Palm connectors
  [[0,1],[0,5],[0,17],[5,9],[9,13],[13,17]].forEach(([a,b]) => {
    const pa = px(landmarks[a]), pb = px(landmarks[b]);
    oc.moveTo(pa.x, pa.y);
    oc.lineTo(pb.x, pb.y);
  });

  // Finger bones
  FINGER_SEGS.forEach(seg => {
    for (let i = 0; i < seg.length - 1; i++) {
      const pa = px(landmarks[seg[i]]), pb = px(landmarks[seg[i+1]]);
      oc.moveTo(pa.x, pa.y);
      oc.lineTo(pb.x, pb.y);
    }
  });

  oc.stroke();

  // ── Dots hanya untuk fingertips + wrist (5+1 = 6 titik) ──
  const keyPoints = [0, 4, 8, 12, 16, 20];
  keyPoints.forEach(i => {
    const p = px(landmarks[i]);
    const isTip = i !== 0;
    oc.beginPath();
    oc.arc(p.x, p.y, isTip ? 4 : 3, 0, Math.PI * 2);
    oc.fillStyle = isTip ? '#00f5c4' : '#7b61ff';
    oc.fill();
  });
}

// ── GESTURE DETECTION ──
function countExtendedFingers(lm) {
  const tips = [8, 12, 16, 20];
  const pips = [6, 10, 14, 18];
  let count = 0;
  for (let i = 0; i < tips.length; i++) {
    if (lm[tips[i]].y < lm[pips[i]].y) count++;
  }
  // thumb check
  if (Math.abs(lm[4].x - lm[3].x) > 0.04) count++;
  return count;
}

// smoothing buffer for gesture stability
let gestureBuffer = [];
const GESTURE_BUFFER_SIZE = 4;

function detectGesture(lm) {
  const n = countExtendedFingers(lm);
  let raw = 'none';
  if (n >= 4) raw = 'open';
  else if (n === 2) raw = 'two';

  gestureBuffer.push(raw);
  if (gestureBuffer.length > GESTURE_BUFFER_SIZE) gestureBuffer.shift();

  // return gesture only if consistently detected
  const counts = { open: 0, two: 0, none: 0 };
  gestureBuffer.forEach(g => counts[g]++);
  if (counts.open >= 3) return 'open';
  if (counts.two >= 3) return 'two';
  return 'none';
}

// ── MEDIAPIPE ──
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 0,       // 0 = lebih ringan, cukup untuk gesture detection
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.5
});

hands.onResults(results => {
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const lm = results.multiHandLandmarks[0];
    drawHandSkeleton(lm);
    const gesture = detectGesture(lm);

    if (gesture === 'open') {
      gestureBadge.textContent = '[ OPEN PALM ] → KANAN';
      gestureBadge.className = 'open';
      if (lastGesture !== 'open' && gameRunning && gestureCooldown === 0) {
        pendingMove = 1; lastGesture = 'open';
      }
    } else if (gesture === 'two') {
      gestureBadge.textContent = '[ 2 JARI ] → KIRI';
      gestureBadge.className = 'two';
      if (lastGesture !== 'two' && gameRunning && gestureCooldown === 0) {
        pendingMove = -1; lastGesture = 'two';
      }
    } else {
      gestureBadge.textContent = '✦ HAND DETECTED';
      gestureBadge.className = 'detected';
      lastGesture = null;
    }
  } else {
    // No hand — clear skeleton canvas (video tampil via CSS <video> tag)
    oc.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
    gestureBadge.textContent = '-- NO SIGNAL --';
    gestureBadge.className = '';
    lastGesture = null;
    gestureBuffer = [];
  }
});

// ── CAMERA TOGGLE ──
let currentFacingMode = 'user'; // 'user' = depan, 'environment' = belakang
let camera = null;
const camToggleBtn = document.getElementById('camToggleBtn');

// Throttle MediaPipe: hanya proses ~15fps, bukan 30fps
let lastHandSendTime = 0;
const HAND_SEND_INTERVAL = 67; // ms, ~15fps

function startCamera(facingMode) {
  camToggleBtn.classList.add('switching');
  gestureBadge.textContent = 'SWITCHING CAMERA...';

  if (camera) camera.stop();

  // Update video mirror via CSS
  video.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';

  camera = new Camera(video, {
    onFrame: async () => {
      const now = performance.now();
      if (now - lastHandSendTime < HAND_SEND_INTERVAL) return; // skip frame
      lastHandSendTime = now;
      await hands.send({ image: video });
    },
    width: 320, height: 180   // resolusi lebih kecil lagi untuk MediaPipe input
  });

  camera.start()
    .then(() => {
      camStatus.textContent = '';
      camToggleBtn.classList.remove('switching');
      camToggleBtn.title = facingMode === 'user' ? 'Ganti ke Kamera Belakang' : 'Ganti ke Kamera Depan';
    })
    .catch(() => {
      camStatus.textContent = '⚠ CAMERA ACCESS REQUIRED';
      camToggleBtn.classList.remove('switching');
    });
}

camToggleBtn.addEventListener('click', () => {
  currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
  startCamera(currentFacingMode);
});

startCamera(currentFacingMode);
</script>
</body>
